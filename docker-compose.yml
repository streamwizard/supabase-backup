services:
  supabase-backup:
    build: .
    restart: always
    volumes:
      - /mnt/backups/supabase:/backups
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - PGPASSWORD=${PGPASSWORD}
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
      - SCHEDULE_TIME=01:00
      - KEEP_DAILY=7
      - KEEP_WEEKLY=4
      - KEEP_MONTHLY=3
